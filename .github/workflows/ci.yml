name: CI

on:
  pull_request:
  push:
    branches: [main]

defaults:
  run:
    working-directory: src

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: src/package-lock.json
      - run: npm ci
      - run: npm run lint

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: src/package-lock.json
      - run: npm ci
      - run: npm run typecheck

  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: notify_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test -d notify_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://test:test@localhost:5432/notify_test
      ENCRYPTION_KEY_V1: LPwAfCwXOEO4XcipVDFoerE8Ew5vyDbcrWhL/WW7OEg=
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: src/package-lock.json
      - run: npm ci
      - run: npm run test
