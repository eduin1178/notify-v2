schema: spec-driven

# ============================================================================
# Project context
# Cargado por OpenSpec/SDD en cada artefacto generado.
# Fuente: openspec/constitution.md + discovery/03-vision.md.
# ============================================================================
context: |
  # Notify — Plataforma SaaS de comunicación WhatsApp para PyMEs LATAM

  ## Misión
  SaaS multi-inquilino que permite a PyMEs latinoamericanas automatizar comunicación
  por WhatsApp combinando: envíos masivos, automatizaciones evento-condición-acción,
  CRM básico e Inbox bidireccional. Operado por EduNet bajo modelo BYO Cloud API
  account. Mercado primario: Colombia y LATAM hispanohablante. Dominio:
  notify.edunet.com.co.

  ## Modelo de negocio (CRÍTICO)
  - EduNet NO intermedia mensajería: el cliente paga su consumo directamente a Meta
    (Cloud API) o asume su propia infraestructura WAHA/EvolutionAPI.
  - La plataforma jamás factura mensajes, "paquetes incluidos" ni overage.
  - EduNet cobra solo el ACCESO a la plataforma con planes basados en límites
    operativos (contactos, canales, operadores, automations, retención, bot IA).
  - Wompi es la única pasarela de cobro en MVP.

  ## Stack tecnológico (decidido — no abrir a debate)
  - Frontend + Backend: Next.js 16 (App Router) + React + TypeScript + shadcn/ui
  - Auth: Better-Auth + plugin Organizations (email+password, Google OAuth, magic link)
  - ORM: Drizzle
  - Base de datos: Postgres en Neon (serverless con branching)
  - Background jobs / FlowRuns: Trigger.dev v3
  - Realtime (Inbox): Pusher
  - Storage multimedia: Cloudflare R2
  - Pasarela de pago: Wompi (única en MVP)
  - Hosting: Vercel o VPS con Dokploy

  ## Principios no negociables
  1. Aislamiento multi-tenant absoluto: toda tabla de dominio incluye
     `organization_id`; todo acceso pasa por repository pattern que lo inyecta.
     Cero leak cross-organization es criterio de release. Tests de aislamiento
     obligatorios en cualquier PR que toque repos.
  2. Consentimiento auditable: todo contacto tiene `ConsentRecord` con fuente y
     timestamp; opt-out (`STOP`) excluye automáticamente. Sin consent registrado,
     no hay envío.
  3. Habeas Data en self-service desde día 1: exportación (JSON/CSV) y borrado por
     solicitud completados en < 24h sin intervención manual. Retención: mensajes
     6 meses; conversaciones, consent, audit log, métricas 12 meses.
  4. Webhook receiver hardened: HMAC + timestamp tolerance + replay protection
     (idempotency-key) en todos los endpoints públicos. Respuesta < 500ms p95;
     procesamiento asíncrono posterior.
  5. Snapshot de plantilla al lanzar campaña: una campaña en vuelo nunca se ve
     afectada por edición o rechazo posterior del template.
  6. Audit log append-only de toda mutación administrativa y operativa, retención
     12 meses, con usuario, organización, timestamp y diff.
  7. Cifrado en reposo de credenciales BYO (tokens Cloud API, sesiones WAHA, API
     keys de OpenRouter del cliente) a nivel de columna. TLS obligatorio en
     tránsito.

  ## Convenciones de código
  - Idioma del código: inglés (identifiers, comments, commits). UI en español.
  - Arquitectura hexagonal en los tres puntos de extensión: `MessagingPort`,
    `PaymentGatewayPort`, `AiGatewayPort`. Dominio NUNCA importa adapters.
  - Estilo: ESLint + Prettier con configuración del repo. CI bloquea si no pasa.
  - Tests obligatorios para: aislamiento multi-tenant (siempre), reglas de
    negocio críticas (campañas, consent, billing, automation engine), webhook
    signature verification, adapters de mensajería con fixtures Cloud API/WAHA.
  - Commits: Conventional Commits. Sin atribución a IA.
  - Branching: trunk-based; feature branches cortas mergeadas a `main` vía PR.
  - PRs: review obligatorio en cualquier cambio que toque repos, auth, billing
    o adapters de provider. CI verde es no negociable.

  ## Decisiones arquitectónicas inmutables
  1. Organización es el ÚNICO nivel de tenant. No hay sub-tenants, equipos
     anidados ni workspaces dentro de la organización.
  2. Multi-provider de mensajería vía hexagonal con BYO credentials: Cloud API y
     WAHA/EvolutionAPI conviven detrás de `MessagingPort`; las credenciales son
     del cliente y se almacenan cifradas.
  3. Automation engine LINEAL (`Evento → Condiciones AND/OR → Acciones[]`) con
     acciones cerradas (`add_tag`, `remove_tag`, `update_contact_field`, `wait`,
     `http_request`, `send_message`) y composición flow→flow. Sin DAG, sin
     branching por resultado intermedio, sin variables compartidas entre acciones.
  4. Trigger.dev v3 es el motor durable de FlowRuns, scheduling y reintentos. No
     se construye scheduler propio.
  5. Outbox pattern para todo evento de dominio que cruce boundaries (mensajería,
     billing, webhooks).
  6. Aislamiento multi-tenant en repository pattern (NO Postgres RLS en MVP).

  ## Límites explícitos del MVP (NO hacer)
  - NO ser BSP de WhatsApp ni revendedor de mensajes de Meta.
  - NO persistir mensaje saliente sin verificar previamente límites del plan.
  - NO exponer endpoint público sin HMAC + replay protection.
  - NO app móvil nativa (ni en roadmap declarado).
  - NO API pública para clientes en MVP (la arquitectura debe permitirla a futuro).
  - NO Postgres RLS en MVP.
  - NO GDPR mientras no haya clientes en Europa (Habeas Data CO es el régimen).
  - NO integraciones nativas con CRMs externos (HubSpot, Zoho, etc.) en MVP.
  - NO MFA / 2FA en MVP (diferido a post-MVP).
  - NO webhooks salientes a sistemas del cliente final (diferido a post-MVP).
  - NO editor visual drag&drop de automations (form-based linear builder en MVP).
  - NO multi-idioma de UI ni de plantillas en MVP (solo Español; arquitectura i18n-ready).
  - NO sincronización recurrente con Google Sheets (solo CSV/XLSX puntual).
  - NO menciones `@usuario` ni SLA timers en Inbox.

  ## Roles
  - SuperAdmin: staff EduNet, atributo global (no de organización). 2–5 totales.
  - Owner: crea la organización, gestiona billing, transfiere propiedad. 1 por org.
  - Admin: gestiona usuarios, canales, plantillas, automations, campañas.
  - Member: invitado con permisos explícitos por feature.
  - Contacto: destinatario final, NO es usuario de la plataforma.

  ## Modelo de dominio (alto nivel)
  - Identity & Tenancy: User, Organization, OrgMembership, MemberPermission,
    Invitation, ApiKey.
  - CRM: Contact (único por organization_id + phone E.164), Tag, ContactTag,
    Segment, ImportJob, ConsentRecord.
  - Messaging: Channel (BYO credentials), Template, Conversation, Message,
    DeliveryEvent.
  - Campaigns & Scheduling: Campaign (template snapshotted), CampaignRecipient,
    ScheduledSend, SendAttempt.
  - Automation: WebhookEndpoint, Trigger, Flow, FlowRun, FlowStepResult.
  - Billing: Plan, Subscription (Wompi), Invoice, EnterpriseLimits.
  - Operación: AuditLog.

  ## Capabilities candidatas (cada una potencial spec de OpenSpec)
  identity, tenancy, billing, contacts, imports, consent, channels, templates,
  campaigns, scheduling, automations, inbox, analytics, audit, admin.

  ## Integraciones externas
  WhatsApp Cloud API (Meta) — BYO. WAHA/EvolutionAPI — BYO infra. Pusher
  (realtime). Trigger.dev v3 (jobs durables). Cloudflare R2 (storage). Google
  OAuth. OpenRouter (BYO-key por bot). Wompi (cobro). Webhooks entrantes
  (WordPress, Wix, Hotmart, Manychat, Meta Lead Ads, custom). Neon Postgres.

  ## Requisitos no funcionales
  - SLA: 99.5% (~3.6h downtime mensual permitido).
  - Concurrencia pico: 100 usuarios simultáneos.
  - Volumen año 1: 100 organizaciones, 50.000 contactos totales,
    10.000–100.000 mensajes/mes.
  - Webhook receiver < 500ms p95.
  - Inbox realtime: latencia mensaje entrante → render < 2s.
  - Importación CSV: 10.000 filas validadas en < 60s (objetivo, validar).
  - Backups escalonados: diario 30d / semanal 6m / mensual 18m.

  ## Criterios de éxito
  1. Tasa de entrega ≥ 95% sobre enviados intencionalmente.
  2. Cero incidentes de leak cross-organization antes de release.
  3. 100% de solicitudes Habeas Data resueltas en self-service < 24h.
  4. Time-to-first-message del nuevo Owner < 30 min desde signup.
  5. ≥ 10 organizaciones pagas activas a 3 meses post-MVP.
  6. Conversión free → paid ≥ 15% durante el trial de 14 días.

# ============================================================================
# Per-artifact rules
# Reglas específicas para cada tipo de artefacto SDD/OpenSpec.
# ============================================================================
rules:
  proposal:
    - Justificar la propuesta contra los principios no negociables de la constitución; si entra en conflicto, marcarlo como riesgo explícito.
    - Incluir secciones obligatorias "Non-goals" y "Riesgos multi-tenant".
    - Identificar qué capabilities (de la lista en context) toca y cuáles introduce nuevas.
    - Si toca repos, auth, billing o adapters de provider, marcar la propuesta como "review obligatorio".
    - Mantener bajo 600 palabras; el detalle va en spec/design.

  spec:
    - Toda spec que defina entidad de dominio DEBE declarar cómo se aísla por `organization_id`.
    - Cada requirement con scenarios en formato Given/When/Then.
    - Para endpoints públicos, especificar verificación HMAC + timestamp tolerance + idempotency-key como requirement, no como detalle.
    - Para mensajería, especificar el contrato detrás de `MessagingPort` sin acoplarse a Cloud API ni WAHA.
    - Toda mutación administrativa u operativa debe declarar su entrada en AuditLog.
    - Datos sensibles (tokens BYO, API keys, PII de contacto) deben declarar cifrado en reposo.

  design:
    - Documentar decisión de arquitectura con tradeoffs y al menos una alternativa descartada con razón.
    - Si introduce un nuevo adapter, justificar contra los puertos existentes (`MessagingPort`, `PaymentGatewayPort`, `AiGatewayPort`); si no encaja, justificar el nuevo puerto.
    - Para flujos cross-boundary (mensajería, billing, webhooks), especificar el uso del Outbox pattern.
    - Para automations, validar que respeta el modelo lineal (sin DAG, sin branching por resultado, sin variables compartidas).
    - Validar dependencias externas (libs, SDKs, versiones) con context7 antes de cerrar el design.
    - Incluir sección "Impacto multi-tenant" describiendo cómo se inyecta `organization_id` en cada query.

  tasks:
    - Dividir en chunks accionables de máximo 2 horas de trabajo.
    - Tareas de migración Drizzle separadas de tareas de aplicación.
    - Toda tarea que toque repos debe incluir su tarea hermana de "test de aislamiento multi-tenant".
    - Toda tarea que exponga endpoint público debe incluir su tarea hermana de "test de HMAC + replay protection".
    - Marcar tareas que requieren review obligatorio (repos, auth, billing, adapters de provider).
    - Estimar review workload: si la suma estimada supera 400 LOC cambiadas, recomendar PR encadenado.
